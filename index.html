<!DOCTYPE html>

<head>

  <link rel="icon" type="image/png" sizes="32x32" href="./images/favicon-32x32.png">

  <title>Frontend Mentor | Huddle landing page with single introductory section</title>
  <link rel="stylesheet" href="./css/style.css">
</head>

<body>
  <header>
    <img class="header__picture" alt="logo" src="./images/logo.svg" />
  </header>

  <div class="main">
    <div class="main__picture">
      <img src="./images/illustration-mockups.svg" alt="mockup">
    </div>
    <div class="main__paragraph">
      <h2 class="main__paragraph--title">
        Build The Community Your Fans Will Love
      </h2>
      <p class="main__paragraph--body">
        Huddle re-imagines the way we build communities. You have a voice, but so does your audience.
        Create connections with your users as you engage in genuine discussion.
      </p>
      <button class="main__paragraph--cta" href="">Register</button>
    </div>
  </div>
